map $http_cf_connecting_ip $chiwawa_client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

limit_req_zone $chiwawa_client_ip zone=chiwawa_api:10m rate=5r/s;
limit_conn_zone $chiwawa_client_ip zone=chiwawa_connections:10m;

server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 25m;
    limit_req_status 429;
    limit_conn_status 429;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Backend health is reachable through the same public origin.
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # Keep the backend private: only this Nginx container can reach it.
    location ^~ /api/ {
        limit_req zone=chiwawa_api burst=20 nodelay;
        limit_conn chiwawa_connections 20;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 15s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
