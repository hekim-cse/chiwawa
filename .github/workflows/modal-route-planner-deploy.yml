name: Deploy Modal Route Planner

on:
  push:
    branches:
      - main
    paths:
      - "ai/route_planner/**"
      - ".github/workflows/modal-route-planner-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy route planner to Modal
    runs-on: ubuntu-latest

    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install route planner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai/route_planner/requirements.txt

      - name: Deploy Modal route planner app
        run: |
          modal deploy -m ai.route_planner.modal_experiments.route_api
