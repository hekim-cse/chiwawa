name: AI Route Planner CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "ai/route_planner/**"
      - ".github/workflows/ai-route-planner-ci.yml"

  push:
    branches:
      - develop
      - main
    paths:
      - "ai/route_planner/**"
      - ".github/workflows/ai-route-planner-ci.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-route-planner-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-evaluate:
    name: Route Planner 테스트 및 평가
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai/route_planner/requirements.txt

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -r ai/route_planner/requirements.txt

      - name: Route Planner 전체 테스트
        run: |
          python -m pytest \
            ai/route_planner/tests

      - name: Route Evaluation 실행
        run: |
          mkdir -p artifacts

          python -m ai.route_planner.scripts.run_route_evaluation \
            --fixture-path \
            ai/route_planner/tests/fixtures/route_evaluation_scenario.json \
            --output-path \
            artifacts/route_evaluation_result.json

      - name: Route Evaluation 결과 확인
        run: |
          python -m json.tool \
            artifacts/route_evaluation_result.json

      - name: Route Evaluation 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: route-evaluation-result
          path: artifacts/route_evaluation_result.json
          if-no-files-found: error
          retention-days: 14

      - name: Day Assignment Evaluation 실행
        run: |
          python -m ai.route_planner.scripts.run_day_assignment_evaluation \
            --fixture-path \
            ai/route_planner/tests/fixtures/day_assignment_evaluation_scenario.json \
            --output-path \
            artifacts/day_assignment_evaluation_result.json

      - name: Day Assignment Evaluation 결과 확인
        run: |
          python -m json.tool \
            artifacts/day_assignment_evaluation_result.json

      - name: Day Assignment Evaluation 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: day-assignment-evaluation-result
          path: artifacts/day_assignment_evaluation_result.json
          if-no-files-found: error
          retention-days: 14

      - name: Route Planner E2E Benchmark 실행
        run: |
          python -m ai.route_planner.scripts.run_e2e_benchmark \
            --fixture-path \
            ai/route_planner/tests/fixtures/e2e_benchmark_scenario.json \
            --output-path \
            artifacts/e2e_benchmark_result.json

      - name: Route Planner E2E Benchmark 결과 확인
        run: |
          python -m json.tool \
            artifacts/e2e_benchmark_result.json

      - name: Route Planner E2E Benchmark 결과 검증
        run: |
          python - <<'PYTHON'
          import json
          from pathlib import Path

          result_path = Path(
              "artifacts/"
              "e2e_benchmark_result.json"
          )

          payload = json.loads(
              result_path.read_text(
                  encoding="utf-8"
              )
          )

          if not payload["deterministic"]:
              raise SystemExit(
                  "E2E Benchmark 반복 결과가 "
                  "결정적이지 않습니다."
              )

          if not all(
              run["complete_assignment"]
              for run in payload["runs"]
          ):
              raise SystemExit(
                  "E2E Benchmark에서 "
                  "완전 배정에 실패했습니다."
              )

          if any(
              run[
                  "provider_missing_element_count"
              ] != 0
              for run in payload["runs"]
          ):
              raise SystemExit(
                  "E2E Benchmark Fixture에서 "
                  "누락 Matrix 구간이 발견되었습니다."
              )

          if any(
              run[
                  "provider_expected_element_count"
              ]
              != run[
                  "provider_returned_element_count"
              ]
              for run in payload["runs"]
          ):
              raise SystemExit(
                  "E2E Benchmark Matrix의 "
                  "예상 구간 수와 반환 구간 수가 "
                  "일치하지 않습니다."
              )
          PYTHON

      - name: Route Planner E2E Benchmark 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: route-planner-e2e-benchmark-result
          path: artifacts/e2e_benchmark_result.json
          if-no-files-found: error
          retention-days: 14
