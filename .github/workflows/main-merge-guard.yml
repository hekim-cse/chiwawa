name: Main Merge Guard

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  check-source-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Check source branch policy
        run: |
          echo "Base branch: ${{ github.base_ref }}"
          echo "Head branch: ${{ github.head_ref }}"

          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "develop" ]; then
            echo "❌ main 브랜치에는 develop 브랜치에서만 PR을 보낼 수 있습니다."
            exit 1
          fi

          echo "✅ 브랜치 정책을 통과했습니다."
